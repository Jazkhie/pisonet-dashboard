<!DOCTYPE html>
<html>
<head>
    <title>JazkhieAS Cloud Dashboard</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs_mqtt/4.3.7/mqtt.min.js"></script>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #161b22; border: 1px solid #333; border-radius: 15px; padding: 30px; margin-top: 20px; }
    </style>
</head>
<body>
    <h2 id="shop-title">Loading Shop...</h2>
    <div class="card">
        <h3>Live Cloud Sales</h3>
        <span id="sales-val" style="font-size: 48px; color: #28a745; font-weight: bold;">₱ 0.00</span>
    </div>

    <script>
        // Connect to HiveMQ public WebSocket port
        const client = mqtt.connect('wss://broker.hivemq.com:8884/mqtt');

        client.on('connect', function () {
            console.log("Connected to Cloud MQTT Broker");
            client.subscribe('jazkhieas/shop/sales', function (err) {
                if (!err) {
                    console.log("Subscribed to sales topic");
                }
            });
        });

        client.on('message', function (topic, message) {
            let data = JSON.parse(message.toString());
            document.getElementById('shop-title').innerText = data.shop + " Dashboard";
            document.getElementById('sales-val').innerText = "₱ " + data.sales + ".00";
        });
    </script>
</body>
</html>
