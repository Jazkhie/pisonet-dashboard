<!DOCTYPE html>
<html>
<head>
    <title>JEC COMPUTER TRADING</title>
    <style>
        body { background: #0b0e14; color: white; font-family: sans-serif; padding: 20px; text-align: center; }
        .card { background: #161b22; border: 1px solid #333; border-radius: 15px; padding: 30px; margin-top: 20px; }
    </style>
    <!-- Include MQTT.js library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/mqtt/4.3.7/mqtt.min.js"></script>
</head>
<body>
    <h2 id="shop-title">JEC COMPUTER TRADING Dashboard</h2>
    <div class="card">
        <h3>Live Cloud Sales</h3>
        <span id="sales-val" style="font-size: 48px; color: #28a745; font-weight: bold;">₱ 0.00</span>
    </div>

    <script>
        function updateSalesDisplay(val) {
            let salesNum = parseFloat(val) || 0;
            document.getElementById('sales-val').innerText = "₱ " + salesNum.toLocaleString('en-US', {minimumFractionDigits: 2, maximumFractionDigits: 2});
        }

        // 1. Initial fallback load from local file/GitHub text so it displays instantly
        async function fetchInitialSales() {
            try {
                let response = await fetch('https://raw.githubusercontent.com/Jazkhie/pisonet-dashboard/main/sales.txt?t=' + new Date().getTime());
                if (response.ok) {
                    let text = await response.text();
                    if(text.trim()) {
                        updateSalesDisplay(text.trim());
                    }
                }
            } catch (e) {
                console.log("Initial fetch fallback error");
            }
        }
        fetchInitialSales();

        // 2. Connect using standard WebSocket port 8000 for public broker compatibility
        const client = mqtt.connect('ws://broker.hivemq.com:8000/mqtt', {
            clientId: 'web_dashboard_' + Math.random().toString(16).substring(2, 8),
            clean: true
        });

        client.on('connect', function () {
            console.log("Connected to live broker");
            client.subscribe('jazkhieas/shop/sales', function (err) {
                if (!err) {
                    console.log("Subscribed to sales updates");
                }
            });
        });

        client.on('message', function (topic, message) {
            try {
                let payloadStr = message.toString();
                let salesVal = 0;

                if (payloadStr.startsWith('{')) {
                    let data = JSON.parse(payloadStr);
                    salesVal = data.sales;
                } else {
                    salesVal = payloadStr;
                }

                if (salesVal !== undefined && salesVal !== null) {
                    updateSalesDisplay(salesVal);
                }
            } catch (e) {
                console.log("Error parsing incoming MQTT message");
            }
        });
    </script>
</body>
</html>
